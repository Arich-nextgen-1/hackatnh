<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Вы не в сети — MediRoute AI</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #EEF3F8;
      color: #172033;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 20px;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(23, 32, 51, 0.08);
      border: 1px solid #DCE5EE;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #E0EEFF;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2563EB;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 10px 0;
    }
    p {
      font-size: 14px;
      color: #64748B;
      line-height: 1.6;
      margin: 0 0 25px 0;
    }
    button {
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    button:hover {
      background: #1D4ED8;
    }
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.5 16a5.5 5.5 0 0 1 7 0M12 20h.01"/>
      </svg>
    </div>
    <h1>Отсутствует подключение</h1>
    <p>Похоже, ваше устройство не подключено к интернету. Пожалуйста, проверьте сеть и попробуйте обновить страницу.</p>
    <button onclick="window.location.reload()">Обновить страницу</button>
  </div>
</body>
</html>
